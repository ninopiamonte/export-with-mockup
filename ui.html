<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f4f4f2;
        --panel: rgba(255, 255, 255, 0.78);
        --panel-border: rgba(16, 16, 16, 0.08);
        --text: #111111;
        --muted: rgba(17, 17, 17, 0.55);
        --accent: #111111;
        --accent-contrast: #ffffff;
        --surface: rgba(255, 255, 255, 0.58);
        --surface-strong: rgba(255, 255, 255, 0.92);
        --shadow: 0 18px 32px rgba(0, 0, 0, 0.12);
        --checker-a: #f5f5f5;
        --checker-b: #dfdfdf;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #171717;
          --panel: rgba(28, 28, 28, 0.82);
          --panel-border: rgba(255, 255, 255, 0.08);
          --text: #f7f7f7;
          --muted: rgba(255, 255, 255, 0.56);
          --accent: #fafafa;
          --accent-contrast: #111111;
          --surface: rgba(255, 255, 255, 0.08);
          --surface-strong: rgba(255, 255, 255, 0.14);
          --shadow: 0 18px 32px rgba(0, 0, 0, 0.3);
          --checker-a: #3a3a3a;
          --checker-b: #2a2a2a;
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family:
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      body {
        padding: 14px;
      }

      .app {
        display: grid;
        gap: 10px;
      }

      .preview {
        position: relative;
        overflow: hidden;
        border-radius: 22px;
        border: 1px solid var(--panel-border);
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(24px);
        padding: 12px;
      }

      .preview-canvas {
        width: 100%;
        aspect-ratio: 45 / 92;
        display: block;
        border-radius: 16px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.12),
          rgba(0, 0, 0, 0.06)
        );
      }

      .controls {
        display: grid;
        gap: 10px;
        padding: 10px;
        border-radius: 20px;
        border: 1px solid var(--panel-border);
        background: var(--panel);
        backdrop-filter: blur(18px);
      }

      .segment {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        padding: 4px;
        border-radius: 999px;
        background: var(--surface);
      }

      .segment button,
      .export-button {
        appearance: none;
        border: none;
        cursor: pointer;
        font: inherit;
      }

      .segment button {
        border-radius: 999px;
        padding: 10px 0;
        color: var(--muted);
        background: transparent;
        font-size: 12px;
        font-weight: 700;
        transition:
          background 120ms ease,
          color 120ms ease,
          transform 120ms ease;
      }

      .segment button.active {
        background: var(--accent);
        color: var(--accent-contrast);
        transform: translateY(-1px);
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        min-height: 38px;
      }

      .checkbox {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 12px;
        font-weight: 700;
        color: var(--text);
      }

      .checkbox input {
        margin: 0;
        inline-size: 15px;
        block-size: 15px;
        accent-color: var(--accent);
      }

      .color-picker {
        appearance: none;
        width: 34px;
        height: 34px;
        padding: 0;
        border: 1px solid var(--panel-border);
        border-radius: 999px;
        background: transparent;
        overflow: hidden;
        cursor: pointer;
      }

      .color-picker::-webkit-color-swatch-wrapper {
        padding: 0;
      }

      .color-picker::-webkit-color-swatch {
        border: none;
        border-radius: 999px;
      }

      .color-picker.hidden {
        visibility: hidden;
        pointer-events: none;
      }

      .export-button {
        width: 100%;
        padding: 14px 16px;
        border-radius: 16px;
        background: var(--accent);
        color: var(--accent-contrast);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.02em;
        transition:
          transform 120ms ease,
          opacity 120ms ease;
      }

      .export-button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .export-button:not(:disabled):active {
        transform: scale(0.99);
      }

      .warning {
        font-size: 11px;
        color: #ff6b6b;
        font-weight: 600;
        padding: 8px 10px;
        background: rgba(255, 107, 107, 0.1);
        border-radius: 8px;
        border: 1px solid rgba(255, 107, 107, 0.2);
      }

      .warning.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="controls">
        <div id="scaleSegment" class="segment">
          <button type="button" data-scale="1">1x</button>
          <button type="button" data-scale="2">2x</button>
          <button type="button" data-scale="3" class="active">3x</button>
        </div>

        <div class="row">
          <label class="checkbox">
            <input id="bgToggle" type="checkbox" />
            <span>Bg</span>
          </label>
          <input
            id="bgColor"
            class="color-picker hidden"
            type="color"
            value="#ffffff"
          />
        </div>

        <div id="warning" class="warning hidden"></div>

        <button id="exportButton" class="export-button" type="button" disabled>
          Export
        </button>
      </div>

      <div class="preview">
        <canvas
          id="previewCanvas"
          class="preview-canvas"
          width="450"
          height="920"
        ></canvas>
      </div>
    </div>

      const DEVICE_WIDTH = 450;
      const DEVICE_HEIGHT = 920;
      const SLOT = { x: 24, y: 23, width: 402, height: 874, radius: 56 };
      const BORDER = { size: 4, color: "#000000" };

      const state = {
        scale: 3,
        count: 0,
        bgEnabled: false,
        bgColor: "#ffffff",
        deviceImage: null,
        previewImage: null,
        exporting: false,
        dimensionWarning: null,
      };

      const previewCanvas = document.getElementById("previewCanvas");
      const previewCtx = previewCanvas.getContext("2d");
      const scaleButtons = Array.from(
        document.querySelectorAll("[data-scale]"),
      );
      const bgToggle = document.getElementById("bgToggle");
      const bgColor = document.getElementById("bgColor");
      const exportButton = document.getElementById("exportButton");
      const warningEl = document.getElementById("warning");

      previewCtx.imageSmoothingEnabled = true;
      previewCtx.imageSmoothingQuality = "high";

      function roundRectPath(ctx, x, y, width, height, radius) {
        const r = Math.max(0, Math.min(radius, width / 2, height / 2));
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + width, y, x + width, y + height, r);
        ctx.arcTo(x + width, y + height, x, y + height, r);
        ctx.arcTo(x, y + height, x, y, r);
        ctx.arcTo(x, y, x + width, y, r);
        ctx.closePath();
      }

      function drawCheckerboard(ctx, width, height, size) {
        for (let y = 0; y < height; y += size) {
          for (let x = 0; x < width; x += size) {
            const even = (x / size + y / size) % 2 === 0;
            ctx.fillStyle = even
              ? getComputedStyle(document.documentElement)
                  .getPropertyValue("--checker-a")
                  .trim()
              : getComputedStyle(document.documentElement)
                  .getPropertyValue("--checker-b")
                  .trim();
            ctx.fillRect(x, y, size, size);
          }
        }
      }

      function drawCoverImage(ctx, img, bounds) {
        if (!img) {
          return;
        }

        const scale = Math.max(
          bounds.width / img.width,
          bounds.height / img.height,
        );
        const drawWidth = img.width * scale;
        const drawHeight = img.height * scale;
        const drawX = bounds.x + (bounds.width - drawWidth) / 2;
        const drawY = bounds.y + (bounds.height - drawHeight) / 2;
        ctx.drawImage(img, drawX, drawY, drawWidth, drawHeight);
      }

      function drawFramePlaceholder(ctx) {
        const gradient = ctx.createLinearGradient(
          SLOT.x,
          SLOT.y,
          SLOT.x,
          SLOT.y + SLOT.height,
        );
        gradient.addColorStop(0, "rgba(255,255,255,0.88)");
        gradient.addColorStop(1, "rgba(0,0,0,0.08)");

        ctx.save();
        roundRectPath(
          ctx,
          SLOT.x,
          SLOT.y,
          SLOT.width,
          SLOT.height,
          SLOT.radius,
        );
        ctx.clip();
        ctx.fillStyle = gradient;
        ctx.fillRect(SLOT.x, SLOT.y, SLOT.width, SLOT.height);
        ctx.fillStyle = "rgba(17,17,17,0.08)";
        ctx.fillRect(SLOT.x + 24, SLOT.y + 28, SLOT.width - 48, 44);
        ctx.fillRect(SLOT.x + 24, SLOT.y + 92, SLOT.width - 76, 20);
        ctx.fillRect(SLOT.x + 24, SLOT.y + 132, SLOT.width - 120, 20);
        ctx.restore();
      }

      function renderPreview() {
        previewCtx.clearRect(0, 0, DEVICE_WIDTH, DEVICE_HEIGHT);

        if (state.bgEnabled) {
          previewCtx.fillStyle = state.bgColor;
          previewCtx.fillRect(0, 0, DEVICE_WIDTH, DEVICE_HEIGHT);
        } else {
          drawCheckerboard(previewCtx, DEVICE_WIDTH, DEVICE_HEIGHT, 28);
        }

        previewCtx.save();
        roundRectPath(
          previewCtx,
          SLOT.x - BORDER.size / 2,
          SLOT.y - BORDER.size / 2,
          SLOT.width + BORDER.size,
          SLOT.height + BORDER.size,
          SLOT.radius + BORDER.size / 2,
        );
        previewCtx.strokeStyle = BORDER.color;
        previewCtx.lineWidth = BORDER.size;
        previewCtx.stroke();
        previewCtx.restore();

        previewCtx.save();
        roundRectPath(
          previewCtx,
          SLOT.x,
          SLOT.y,
          SLOT.width,
          SLOT.height,
          SLOT.radius,
        );
        previewCtx.clip();
        if (state.previewImage) {
          drawCoverImage(previewCtx, state.previewImage, SLOT);
        } else {
          drawFramePlaceholder(previewCtx);
        }
        previewCtx.restore();

        if (state.deviceImage) {
          previewCtx.drawImage(
            state.deviceImage,
            0,
            0,
            DEVICE_WIDTH,
            DEVICE_HEIGHT,
          );
        }
      }

      function updateUI() {
        exportButton.disabled =
          state.count === 0 || state.exporting || !state.deviceImage;
        if (state.exporting) {
          exportButton.textContent = "Exporting...";
        } else {
          exportButton.textContent =
            state.count > 1 ? `Export ${state.count}` : "Export";
        }
        bgColor.classList.toggle("hidden", !state.bgEnabled);

        if (state.dimensionWarning) {
          warningEl.textContent = state.dimensionWarning;
          warningEl.classList.remove("hidden");
        } else {
          warningEl.classList.add("hidden");
        }

        for (const button of scaleButtons) {
          button.classList.toggle(
            "active",
            Number(button.dataset.scale) === state.scale,
          );
        }

        renderPreview();
      }

      function bytesToImage(bytes) {
        return new Promise((resolve, reject) => {
          const blob = new Blob([new Uint8Array(bytes)], { type: "image/png" });
          const url = URL.createObjectURL(blob);
          const img = new Image();
          img.onload = () => {
            URL.revokeObjectURL(url);
            resolve(img);
          };
          img.onerror = () => {
            URL.revokeObjectURL(url);
            reject(new Error("Failed to load image."));
          };
          img.src = url;
        });
      }

      function dataUrlToImage(url) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = () => reject(new Error("Failed to load mockup asset."));
          img.src = url;
        });
      }

      async function loadAssets() {
        state.deviceImage = await dataUrlToImage(DEVICE_DATA_URL);
        updateUI();
      }

      function serializeCanvas(canvas) {
        return new Promise((resolve) => {
          canvas.toBlob((blob) => resolve(blob), "image/png");
        });
      }

      function saveBlob(blob, filename) {
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }

      function buildFilenames(items) {
        const totals = new Map();
        const used = new Map();

        for (const item of items) {
          const base = sanitizeBaseName(item.name);
          totals.set(base, (totals.get(base) || 0) + 1);
        }

        return items.map((item) => {
          const base = sanitizeBaseName(item.name);
          const seen = (used.get(base) || 0) + 1;
          used.set(base, seen);

          if ((totals.get(base) || 0) === 1) {
            return `${base}.png`;
          }

          const digits = Math.max(2, String(totals.get(base)).length);
          return `${base}-${String(seen).padStart(digits, "0")}.png`;
        });
      }

      function sanitizeBaseName(name) {
        const clean = (name || "export")
          .replace(/[\\/:*?"<>|]+/g, " ")
          .replace(/\s+/g, " ")
          .trim();
        return clean || "export";
      }

      async function composeExport(item) {
        const canvas = document.createElement("canvas");
        canvas.width = DEVICE_WIDTH * state.scale;
        canvas.height = DEVICE_HEIGHT * state.scale;
        const ctx = canvas.getContext("2d");
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";
        ctx.scale(state.scale, state.scale);

        if (state.bgEnabled) {
          ctx.fillStyle = state.bgColor;
          ctx.fillRect(0, 0, DEVICE_WIDTH, DEVICE_HEIGHT);
        }

        ctx.save();
        roundRectPath(
          ctx,
          SLOT.x - BORDER.size / 2,
          SLOT.y - BORDER.size / 2,
          SLOT.width + BORDER.size,
          SLOT.height + BORDER.size,
          SLOT.radius + BORDER.size / 2,
        );
        ctx.strokeStyle = BORDER.color;
        ctx.lineWidth = BORDER.size;
        ctx.stroke();
        ctx.restore();

        const frameImage = await bytesToImage(item.bytes);
        ctx.save();
        roundRectPath(
          ctx,
          SLOT.x,
          SLOT.y,
          SLOT.width,
          SLOT.height,
          SLOT.radius,
        );
        ctx.clip();
        drawCoverImage(ctx, frameImage, SLOT);
        ctx.restore();

        ctx.drawImage(state.deviceImage, 0, 0, DEVICE_WIDTH, DEVICE_HEIGHT);
        return serializeCanvas(canvas);
      }

      scaleButtons.forEach((button) => {
        button.addEventListener("click", () => {
          state.scale = Number(button.dataset.scale);
          updateUI();
        });
      });

      bgToggle.addEventListener("change", () => {
        state.bgEnabled = bgToggle.checked;
        updateUI();
      });

      bgColor.addEventListener("input", () => {
        state.bgColor = bgColor.value;
        updateUI();
      });

      exportButton.addEventListener("click", () => {
        if (state.exporting || state.count === 0) {
          return;
        }

        state.exporting = true;
        updateUI();
        parent.postMessage(
          {
            pluginMessage: {
              type: "EXPORT",
              multiplier: state.scale,
            },
          },
          "*",
        );
      });

      window.onmessage = async (event) => {
        const msg = event.data.pluginMessage;
        if (!msg) {
          return;
        }

        if (msg.type === "SELECTION_STATE") {
          state.count = msg.count || 0;
          state.dimensionWarning = msg.dimensionWarning || null;
          if (msg.preview && msg.preview.bytes) {
            try {
              state.previewImage = await bytesToImage(msg.preview.bytes);
            } catch {
              state.previewImage = null;
            }
          } else {
            state.previewImage = null;
          }
          updateUI();
          return;
        }

        if (msg.type === "EXPORT_RESULT") {
          try {
            const filenames = buildFilenames(msg.items || []);
            for (let index = 0; index < (msg.items || []).length; index += 1) {
              const blob = await composeExport(msg.items[index]);
              saveBlob(blob, filenames[index]);
            }
          } finally {
            state.exporting = false;
            updateUI();
          }
          return;
        }

        if (msg.type === "EXPORT_ERROR") {
          state.exporting = false;
          updateUI();
          exportButton.textContent = msg.message || "Export";
          setTimeout(updateUI, 1400);
        }
      };

      loadAssets().catch(() => {
        exportButton.textContent = "Asset Error";
        exportButton.disabled = true;
      });

      parent.postMessage(
        {
          pluginMessage: {
            type: "RESIZE_UI",
            width: 320,
            height: 438,
          },
        },
        "*",
      );

      updateUI();
    </script>
  </body>
</html>
